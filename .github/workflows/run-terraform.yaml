name: Terraform OCI Instance (OIDC + UPST)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      DOMAIN_BASE_URL: ${{ secrets.DOMAIN_BASE_URL }}
      OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      USER_OCID: ${{ secrets.USER_OCID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------
      # 1. Generate ephemeral key
      # -----------------------------
      - name: Generate RSA key pair
        run: |
          mkdir -p .oci
          openssl genrsa -out .oci/key.pem 2048
          chmod 600 .oci/key.pem

      # -----------------------------
      # 2. Get GitHub OIDC token
      # -----------------------------
      - name: Fetch GitHub OIDC token
        run: |
          curl -sSL -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${CLIENT_ID}" \
          | jq -r '.value' > .oci/github.jwt

      # -----------------------------
      # 3. Exchange â†’ OCI UPST
      # -----------------------------
      - name: Exchange token for OCI UPST
        run: |
          AUTH=$(printf "%s:%s" "$CLIENT_ID:$CLIENT_SECRET" | base64 | tr -d '\n')
          JWT=$(tr -d '\n' < .oci/github.jwt)

          PUBKEY=$(openssl rsa -in .oci/key.pem -pubout \
            | awk 'NR>1 && !/END/ {printf "%s",$0}')

          curl -sSL \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
            --data-urlencode "requested_token_type=urn:oci:token-type:oci-upst" \
            --data-urlencode "subject_token=$JWT" \
            --data-urlencode "subject_token_type=jwt" \
            --data-urlencode "public_key=$PUBKEY" \
            "$DOMAIN_BASE_URL/oauth2/v1/token" \
            | jq -r '.token' > .oci/upst.token

          if [ ! -s .oci/upst.token ]; then
            echo "âťŚ Failed to get UPST token"
            exit 1
          fi

      # -----------------------------
      # 4. Configure OCI CLI
      # -----------------------------
      - name: Configure OCI
        run: |
          mkdir -p $HOME/.oci
          cp .oci/key.pem $HOME/.oci/key.pem
          cp .oci/upst.token $HOME/.oci/token

          chmod 600 $HOME/.oci/key.pem $HOME/.oci/token

          FP=$(openssl rsa -pubout -outform DER -in $HOME/.oci/key.pem \
            | openssl md5 -c | awk '{print $2}')

          cat > $HOME/.oci/config <<EOF
          [DEFAULT]
          user=$USER_OCID
          tenancy=$OCI_TENANCY
          region=$OCI_REGION
          fingerprint=$FP
          key_file=$HOME/.oci/key.pem
          security_token_file=$HOME/.oci/token
          EOF

      # -----------------------------
      # 5. Terraform
      # -----------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan
        run: terraform plan
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform
