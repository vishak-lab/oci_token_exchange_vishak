name: Run Terraform with GitHub OIDC to OCI UPST

# Trigger manually
on:
  workflow_dispatch:

permissions:
  id-token: write       # Required to request OIDC token
  contents: read

jobs:
  upst-terraform:
    runs-on: ubuntu-latest
    env:
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      DOMAIN_BASE_URL: ${{ secrets.DOMAIN_BASE_URL }}
      OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      USER_OCID: ${{ secrets.USER_OCID }}

    steps:
      # -----------------------------
      # 1. Checkout the repo
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Generate RSA key pair for UPST
      # -----------------------------
      - name: Generate RSA Key Pair
        run: |
          mkdir -p .oci
          openssl genrsa -out .oci/temp_private.pem 2048
          openssl rsa -in .oci/temp_private.pem -pubout -out .oci/temp_public.pem
          chmod 600 .oci/temp_private.pem .oci/temp_public.pem

      - name: Convert Private Key to Single Line (No Headers)
        id: privkey
        run: |
          awk '/BEGIN PRIVATE KEY/ {skip=1; next} /END PRIVATE KEY/ {skip=0; next} skip {gsub(/\r/, ""); printf "%s", $0;}' \
            .oci/temp_private.pem > .oci/private_key.one_line.pem

      - name: Convert Public Key (No Headers)
        id: pubkey
        run: |
          awk '/BEGIN PUBLIC KEY/ {skip=1; next} /END PUBLIC KEY/ {skip=0; next} skip {gsub(/\r/, ""); printf "%s", $0;}' \
            .oci/temp_public.pem > .oci/public_key.one_line.pem
          PUBKEY=$(cat .oci/public_key.one_line.pem)
          echo "pubkey=$PUBKEY" >> $GITHUB_OUTPUT

      # -----------------------------
      # 3. Fetch GitHub OIDC Token
      # -----------------------------
      - name: Fetch GitHub OIDC Token
        id: jwt
        run: |
          curl -sSL -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${CLIENT_ID}" > .oci/id-token.json

          JWT=$(jq -r '.value' .oci/id-token.json)
          echo "$JWT" > .oci/id-token.jwt
          echo "jwt=$JWT" >> $GITHUB_OUTPUT

      # -----------------------------
      # 4. Exchange OIDC → OCI UPST
      # -----------------------------
      - name: Exchange JWT for OCI UPST
        id: upst
        run: |
          AUTH_HEADER=$(printf "%s:%s" "${CLIENT_ID}:${CLIENT_SECRET}" | base64 -w0)
          SUBJECT_TOKEN=$(tr -d '\n' < .oci/id-token.jwt)
          PUBKEY=$(tr -d '\n' < .oci/public_key.one_line.pem)

          RESPONSE=$(curl -sSL \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --header "Authorization: Basic $AUTH_HEADER" \
            --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
            --data-urlencode "requested_token_type=urn:oci:token-type:oci-upst" \
            --data-urlencode "subject_token=$SUBJECT_TOKEN" \
            --data-urlencode "subject_token_type=jwt" \
            --data-urlencode "public_key=$PUBKEY" \
            "${DOMAIN_BASE_URL}/oauth2/v1/token")

          echo "$RESPONSE" > .oci/upst-response.json
          TOKEN=$(echo "$RESPONSE" | jq -r '.token' | tr -d '\r\n')

          if [ -z "$TOKEN" ]; then
            echo "❌ Failed to extract UPST token"
            cat .oci/upst-response.json
            exit 1
          fi

          echo "$TOKEN" > .oci/upst.token
          echo "UPST token saved successfully."

      # -----------------------------
      # 5. Configure OCI CLI for Terraform
      # -----------------------------
      - name: Configure OCI CLI
        run: |
          mkdir -p $HOME/.oci
          cp .oci/temp_private.pem $HOME/.oci/key.pem
          cp .oci/upst.token $HOME/.oci/token
          chmod 600 $HOME/.oci/key.pem $HOME/.oci/token

          # Create OCI config for Terraform (UPST)
          cat > $HOME/.oci/config <<EOF
[DEFAULT]
user=$USER_OCID
tenancy=$OCI_TENANCY
region=$OCI_REGION
key_file=$HOME/.oci/key.pem
security_token_file=$HOME/.oci/token
EOF

      # -----------------------------
      # 6. Upload Debug Artifacts (optional)
      # -----------------------------
      - name: Upload Debug Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oci-upst-debug
          path: |
            .oci/id-token.jwt
            .oci/upst-response.json
            .oci/upst.token
            .oci/temp_private.pem
            .oci/temp_public.pem
            .oci/public_key.one_line.pem

      # -----------------------------
      # 7. Setup Terraform
      # -----------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.0

      # -----------------------------
      # 8. Terraform Init (local backend)
      # -----------------------------
      - name: Terraform Init
        run: terraform init
        working-directory: terraform/vcn

      # -----------------------------
      # 9. Terraform Plan
      # -----------------------------
      - name: Terraform Plan
        run: terraform plan
        working-directory: terraform/vcn

      # -----------------------------
      # 10. Terraform Apply
      # -----------------------------
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform/vcn

      # -----------------------------
      # 11. List OCI files for verification
      # -----------------------------
      - name: List OCI CLI Files
        run: ls -l $HOME/.oci/
