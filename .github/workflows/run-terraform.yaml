name: Create OCI Instance via Terraform

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      DOMAIN_BASE_URL: ${{ secrets.DOMAIN_BASE_URL }}
      OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      USER_OCID: ${{ secrets.USER_OCID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Generate temp key
      - name: Generate RSA key
        run: |
          mkdir -p .oci
          openssl genrsa -out .oci/key.pem 2048

      # Get GitHub OIDC token
      - name: Fetch OIDC token
        run: |
          curl -sSL -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${CLIENT_ID}" \
          | jq -r '.value' > .oci/token.jwt

      # Exchange for OCI token (UPST)
      - name: Exchange token
        run: |
          AUTH=$(printf "%s:%s" "$CLIENT_ID" "$CLIENT_SECRET" | base64 | tr -d '\n')
          JWT=$(cat .oci/token.jwt | tr -d '\n')

          PUB=$(openssl rsa -in .oci/key.pem -pubout \
            | awk 'NR>1 && !/END/ {printf "%s",$0}')

          curl -sSL \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
            --data-urlencode "requested_token_type=urn:oci:token-type:oci-upst" \
            --data-urlencode "subject_token=$JWT" \
            --data-urlencode "subject_token_type=jwt" \
            --data-urlencode "public_key=$PUB" \
            "$DOMAIN_BASE_URL/oauth2/v1/token" \
            | jq -r '.token' > .oci/upst.token

      # Configure OCI CLI
      - name: Configure OCI
        run: |
          mkdir -p $HOME/.oci
          cp .oci/key.pem $HOME/.oci/key.pem
          cp .oci/upst.token $HOME/.oci/token

          FP=$(openssl rsa -pubout -outform DER -in $HOME/.oci/key.pem \
            | openssl md5 -c | awk '{print $2}')

          cat > $HOME/.oci/config <<EOF
          [DEFAULT]
          user=$USER_OCID
          tenancy=$OCI_TENANCY
          region=$OCI_REGION
          fingerprint=$FP
          key_file=$HOME/.oci/key.pem
          security_token_file=$HOME/.oci/token
          EOF

      # Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform
